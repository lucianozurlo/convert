<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <title>Swiper Custom Navigation</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=1" />

    <style>
        html,
        body {
            position: relative;
            height: 100%;
        }

        body {
            background: #eee;
            font-family: Helvetica Neue, Helvetica, Arial, sans-serif;
            font-size: 14px;
            color: #000;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        swiper-container {
            width: 80%;
            height: 300px;
        }

        swiper-slide {
            text-align: center;
            font-size: 18px;
            background: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .controls {
            margin-top: 20px;
            display: flex;
            gap: 10px;
        }

        .nav-link {
            width: 50px;
            height: 50px;
            display: inline-block;
        }

        .nav-link img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            transition: opacity 0.3s ease-in-out;
        }

        .disabled {
            pointer-events: none;
            opacity: 0.4;
        }
    </style>
</head>

<body>

    <swiper-container class="testimonials">
        <swiper-slide>Slide 1</swiper-slide>
        <swiper-slide>Slide 2</swiper-slide>
        <swiper-slide>Slide 3</swiper-slide>
        <swiper-slide>Slide 4</swiper-slide>
        <swiper-slide>Slide 5</swiper-slide>
        <swiper-slide>Slide 6</swiper-slide>
        <swiper-slide>Slide 7</swiper-slide>
        <swiper-slide>Slide 8</swiper-slide>
        <swiper-slide>Slide 9</swiper-slide>
    </swiper-container>

    <div class="controls">
        <a href="#" id="prevBtn" class="nav-link disabled">
            <img src="img/bt-prev.svg" alt="Anterior">
        </a>
        <a href="#" id="nextBtn" class="nav-link">
            <img src="img/bt-next.svg" alt="Siguiente">
        </a>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-element-bundle.min.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", function () {
            const swiperEl = document.querySelector('.testimonials');
            const prevBtn = document.getElementById('prevBtn');
            const nextBtn = document.getElementById('nextBtn');

            const swiper = swiperEl.swiper;

            function updateButtons() {
                const index = swiper.realIndex;
                const totalSlides = swiper.slides.length - 1;

                prevBtn.classList.toggle("disabled", index === 0);
                nextBtn.classList.toggle("disabled", index === totalSlides);
            }

            swiperEl.addEventListener("swiperslidechange", updateButtons);

            prevBtn.addEventListener("click", (event) => {
                event.preventDefault();
                if (!prevBtn.classList.contains("disabled")) {
                    swiper.slidePrev();
                }
            });

            nextBtn.addEventListener("click", (event) => {
                event.preventDefault();
                if (!nextBtn.classList.contains("disabled")) {
                    swiper.slideNext();
                }
            });

            // Inicializamos el estado de los botones
            updateButtons();
        });
    </script>

</body>

</html>
